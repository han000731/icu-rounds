;margin-top:2px}.fill-record-item .fill-arrow{margin-left:auto;color:var(--blue2);font-weight:900}@media(max-width:767px){.top{flex-wrap:wrap;gap:6px}.top h1{order:3;flex:1 0 100%;margin:0;font-size:16px}.top button:not(.me-btn){flex:1;min-width:72px}.me-btn{padding:0 6px!important}.me-name{display:none}.me-panel{display:block}.avatar-large{margin:0 auto 12px;display:flex;align-items:center;justify-content:center}.entry-actions #fillFromRecord{max-width:none}.check-option{align-items:flex-start;padding-top:2px}.check-option input[type="checkbox"]{margin-top:1px}.fill-record-item{align-items:flex-start}.fill-record-item .fill-arrow{padding-top:3px}}

<body><main class="app" id="app">
<header class="top"><button id="meBtn" class="me-btn" title="我的设置"><span id="meAvatar" class="me-avatar">我</span><span id="meName" class="me-name">我的</span></button><h1 data-ui="appTitle">ICU 查房记录</h1><button id="textEdit" data-ui="editText">编辑文字</button><button id="manageBtn" data-ui="managePatients">患者管理</button><button id="backupBtn" data-ui="backup">备份</button></header>
<section class="toolbar"><input id="search" placeholder="搜索床号或姓名" data-ui-placeholder="search"><button class="primary" id="newPatient" data-ui="newPatient">新增患者</button></section>
<section class="patients" id="patientList"></section>
<nav class="tabs"><button class="tab active" data-page="entry" data-ui="roundEntry">查房录入</button><button class="tab" data-page="timeline" data-ui="timeline">历史时间线</button><button class="tab" data-page="export" data-ui="export">导出</button></nav>
<section id="entryPage"><div class="edit-banner" id="editBanner">正在编辑历史记录。保存将覆盖原记录。</div><div class="card"><div class="card-body"><div class="grid entry-top-grid"><div class="field"><label data-ui="roundTime">查房时间</label><div class="inline-row"><input type="datetime-local" id="roundTime"><button id="nowTime" title="设置为当前时间">🕒 此刻</button></div></div><div class="field"><label data-ui="shift">班次</label><div class="inline-row"><select id="shiftSelect"></select><button id="editShifts">编辑班次</button></div></div><div class="field"><label data-ui="handover">交班备注</label><input id="handover" placeholder="简短交班要点"></div><div class="field entry-actions"><label>&nbsp;</label><div class="inline-row"><button id="manageOrder">⚙️ 模块顺序</button><button id="fillFromRecord">提取</button></div></div></div></div></div><div id="formCards"></div><div class="card"><div class="card-head"><h2 data-ui="course">病程记录</h2></div><div class="card-body"><textarea id="course" placeholder="记录当日病情变化、诊疗调整等"></textarea></div></div><div class="toolbar"><button id="clearDraft" data-ui="clear">清空</button><button class="primary" id="saveRound" data-ui="saveRound">保存本次查房记录</button></div></section>
<section id="timelinePage" hidden></section>
<section id="exportPage" hidden><div class="card"><div class="card-body"><div class="toolbar"><button class="primary" id="generateExport" data-ui="generateText">生成病程文本</button><button id="copyExport" data-ui="copy">复制</button></div><textarea class="export" id="exportText" readonly></textarea></div></div><div class="card"><div class="card-body"><div class="toolbar"><button class="primary" id="downloadJson" data-ui="downloadJson">导出 JSON 文件</button><button id="importJson" data-ui="importJson">导入 JSON 文件</button><input type="file" id="jsonFile" accept="application/json" hidden></div><p class="quiet">导入会按床号和住院号匹配并覆盖同一患者。</p></div></div></section>
</main><button class="fab-save" id="fabSave">💾 保存</button>
<div class="modal-wrap" id="patientModal"><div class="modal"><h2 id="patientModalTitle">新增患者</h2><div class="grid"><div class="field"><label>床号 *</label><input id="pBed"></div><div class="field"><label>姓名 *</label><input id="pName"></div><div class="field"><label>年龄</label><input id="pAge" type="number"></div><div class="field"><label>体重 (kg)</label><input id="pWeight" type="number" step="0.1"></div><div class="field span2"><label>住院号</label><input id="pAdm"></div><div class="field span2"><label>诊断</label><input id="pDiag"></div></div><div class="modal-foot"><button data-close="patientModal">取消</button><button class="primary" id="savePatient">保存</button></div><div id="patientManageList"></div></div></div>
<div class="modal-wrap" id="infModal"><div class="modal"><h2 id="infTitle">记录调整</h2><div class="grid"><div class="field"><label>当前泵速 (mL/h) *</label><input id="infRate" type="number" min="0.01" step="0.1"></div><div class="field"><label>时间</label><input id="infTime" type="datetime-local"></div><div class="field span2"><label>备注</label><input id="infNote" placeholder="可选"></div></div><div class="calc" id="infCalc">剂量：—</div><div class="modal-foot"><button id="infConfig">配置浓度</button><button data-close="infModal">取消</button><button class="primary" id="saveInf">确认保存</button></div></div></div>
<div class="modal-wrap" id="concModal"><div class="modal"><h2 id="concTitle">配置浓度</h2><div class="field"><label>配药浓度 (mg/mL)</label><input id="concInput" type="number" min="0.001" step="0.001"></div><div class="modal-foot"><button data-close="concModal">取消</button><button class="primary" id="saveConc">保存浓度</button></div></div></div>
<div class="modal-wrap" id="orderModal"><div class="modal"><h2>管理模块顺序</h2><div id="orderList"></div><div class="modal-foot"><button data-close="orderModal">关闭</button></div></div></div>
<div class="modal-wrap" id="fieldModal"><div class="modal"><h2 id="fieldModalTitle">管理字段</h2><p class="quiet" id="fieldModalHint"></p><div id="fieldList"></div><div class="modal-foot"><button data-close="fieldModal">关闭</button></div></div></div>
<div class="modal-wrap" id="shiftModal"><div class="modal"><h2>编辑班次</h2><div class="inline-row"><input id="newShift" placeholder="新增班次名称"><button class="primary" id="addShift">添加</button></div><div id="shiftList"></div><div class="modal-foot"><button data-close="shiftModal">关闭</button></div></div></div>
<div class="modal-wrap" id="extractModal"><div class="modal"><h2 id="extractTitle">提取查房数据</h2><textarea class="export" id="extractOutput" readonly></textarea><div class="modal-foot"><button id="copyExtract">复制</button><button class="primary" id="downloadExtract">下载 JSON</button><button data-close="extractModal">关闭</button></div></div></div>
<div class="modal-wrap" id="fillModal"><div class="modal"><h2>从历史记录提取到当前表单</h2><label class="check-option"><input type="checkbox" id="fillKeepTime" checked><span>保留当前查房时间</span></label><label class="check-option"><input type="checkbox" id="fillKeepNotes"><span>同时继承病程和交班备注</span></label><div id="fillRecordList"></div><div class="modal-foot"><button data-close="fillModal">关闭</button></div></div></div><div class="notice" id="notice"></div>
<div class="modal-wrap" id="meModal"><div class="modal"><h2>我的</h2><div class="me-panel"><button id="avatarPick" class="avatar-large" title="更换头像">我</button><input type="file" id="avatarFile" accept="image/*" hidden><div class="me-form"><div class="field"><label>昵称</label><input id="profileName" placeholder="例如：ICU 查房"></div><div class="field"><label>备注</label><textarea id="profileNote" placeholder="可记录科室、设备、使用说明等"></textarea></div></div></div><div class="storage-line" id="storageUsage">当前本机数据：— MB / 建议上限 5 MB</div><div id="cloudPanel"><h3 class="me-section-title">坚果云备份</h3><div class="grid"><div class="field span2"><label>WebDAV 地址</label><input id="davUrl" placeholder="https://dav.jianguoyun.com/dav/"></div><div class="field"><label>账号</label><input id="davUser" placeholder="坚果云邮箱"></div><div class="field"><label>应用密码</label><input id="davPass" type="password" placeholder="不是登录密码"></div><div class="field span2"><label>备份文件名/路径</label><input id="davPath" placeholder="icu-rounds-backup.json"></div><div class="field"><label>&nbsp;</label><label class="check-option compact"><input type="checkbox" id="davAuto"><span>保存后自动上传</span></label></div></div><p class="quiet">App 版可使用坚果云 WebDAV 上传/恢复；网页版建议使用 JSON 导出后自行保存。</p><div class="modal-foot cloud-actions"><button id="testDav">测试连接</button><button id="uploadDav">上传备份</button><button id="restoreDav" class="danger">从云端恢复</button></div></div><div id="webBackupNote" class="storage-line">网页版：请使用「导出」里的 JSON 文件自行备份，不启用云端上传。</div><div class="modal-foot"><button class="primary" id="saveMe">保存设置</button><button data-close="meModal">关闭</button></div></div></div>
<script>

function dose(c,r){return c*r}function neDose(c,r,w){return c*r*1000/(60*w)}function latestLog(p,name){return [...p.infusionLogs].filter(x=>x.drugName===name).sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp))[0]||null}function renderInfusion(){const p=patient(),list=$('#infusionList'),logs=$('#infusionLogs');if(!p||!list)return;ensure(p);list.innerHTML=p.customConfig.infusionDrugs.map(d=>{const l=latestLog(p,d.name),cur=l?`当前 <b>${(+l.newRate).toFixed(1)} mL/h → ${(+l.doseMgPerHour).toFixed(2)} mg/h</b>${l.doseMcgPerKgMin!=null?` (${(+l.doseMcgPerKgMin).toFixed(3)} μg/kg/min)`:''}`:`浓度 ${d.conc??'未设置'} mg/mL · 暂无记录`;return `<div class="inf-row"><span class="inf-name">${esc(d.name)}</span><span class="inf-current">${cur}</span><span class="inf-actions"><button class="small record-inf" data-id="${d.id}">记录调整</button><button class="small config-inf" data-id="${d.id}">浓度</button><button class="small danger delete-drug" data-id="${d.id}">✕ 删除</button></span></div>`}).join('');logs.innerHTML=[...p.infusionLogs].sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp)).map(l=>`<div class="log"><button class="small danger delete-log" data-id="${l.id}">删除</button><time>${fmt(l.timestamp)}</time>　<b>${esc(l.drugName)}</b><br>泵速：${l.previousRate==null?'起始':(+l.previousRate).toFixed(1)+' → '}${(+l.newRate).toFixed(1)} mL/h<br>剂量：${(+l.doseMgPerHour).toFixed(2)} mg/h${l.doseMcgPerKgMin!=null?` ｜ ${(+l.doseMcgPerKgMin).toFixed(3)} μg/kg/min`:''}${l.note?`<br><span class="quiet">备注：${esc(l.note)}</span>`:''}</div>`).join('')||'<div class="empty">暂无调整记录</div>';$$('.record-inf').forEach(b=>b.onclick=()=>openInf(b.dataset.id));$$('.config-inf').forEach(b=>b.onclick=()=>openConc(b.dataset.id));$$('.delete-drug').forEach(b=>b.onclick=()=>{const a=p.customConfig.infusionDrugs;if(a.length<2)return toast('至少保留 1 种药物');if(confirm('删除药物配置？历史记录会保留。')){p.customConfig.infusionDrugs=a.filter(x=>x.id!==b.dataset.id);save();renderInfusion()}});$$('.delete-log').forEach(b=>b.onclick=()=>{if(confirm('删除该调整记录？')){p.infusionLogs=p.infusionLogs.filter(x=>x.id!==b.dataset.id);save();renderInfusion()}})}

function renderInfCalc(){const p=patient(),d=p?.customConfig.infusionDrugs.find(x=>x.id===infCtx?.id),r=n($('#infRate').value),box=$('#infCalc');if(!d?.conc){box.textContent='尚未配置浓度，请先点击「配置浓度」';return}if(!r||r<=0){box.textContent='剂量：—';return}let t=`剂量：${dose(d.conc,r).toFixed(2)} mg/h`;if(d.name.includes('去甲肾')&&n(p.weight)>0)t+=` ｜ ${neDose(d.conc,r,n(p.weight)).toFixed(3)} μg/kg/min`;box.textContent=t}

function saveInf(){const p=patient(),d=p?.customConfig.infusionDrugs.find(x=>x.id===infCtx?.id),r=n($('#infRate').value);if(!d?.conc)return toast('请先配置浓度');if(!r||r<=0)return toast('请输入大于 0 的泵速');const prev=latestLog(p,d.name),w=n(p.weight),time=$('#infTime').value||localTime();p.infusionLogs.push({id:uid(),drugName:d.name,concentration:+d.conc,previousRate:prev?+prev.newRate:null,newRate:r,doseMgPerHour:+dose(d.conc,r).toFixed(4),doseMcgPerKgMin:d.name.includes('去甲肾')&&w>0?+neDose(d.conc,r,w).toFixed(5):null,patientWeight:w,note:$('#infNote').value.trim(),timestamp:time});save();$('#infModal').classList.remove('show');renderInfusion();toast('已记录调整')}
function renderTimeline(){const p=patient(),box=$('#timelinePage');if(!p){box.innerHTML='<div class="empty">请先选择患者</div>';return}ensure(p);const records=[...p.records].sort((a,b)=>new Date(b.time)-new Date(a.time)),snap=snapshotHtml(p,records[0]);if(!records.length){box.innerHTML=snap+'<div class="empty">暂无查房记录，请到「查房录入」填写</div>';return}box.innerHTML=snap+`<div class="timeline-list">${records.map(r=>`<article class="timeline-item" data-id="${r.id}"><header class="timeline-head"><b>${timelineTitle(r)}</b><button class="small edit-round" data-id="${r.id}">✏ 编辑</button><button class="small export-round" data-id="${r.id}">导出</button><button class="small extract-round" data-id="${r.id}">提取数据</button><button class="small danger delete-round" data-id="${r.id}">删除</button></header><div class="timeline-body">${summary(r,p)}</div></article>`).join('')}</div>`;$$('.timeline-head').forEach(h=>h.onclick=e=>{if(e.target.closest('button'))return;h.closest('.timeline-item').classList.toggle('open')});$$('.edit-round').forEach(b=>b.onclick=e=>{e.stopPropagation();editRound(b.dataset.id)});$$('.delete-round').forEach(b=>b.onclick=e=>{e.stopPropagation();if(confirm('删除该查房记录？')){p.records=p.records.filter(x=>x.id!==b.dataset.id);if(editingId===b.dataset.id)editingId=null;save();startDraft(latestRound(p));renderAll();toast('已删除')}});$$('.export-round').forEach(b=>b.onclick=e=>{e.stopPropagation();copy(roundText(p,p.records.find(x=>x.id===b.dataset.id)))});$$('.extract-round').forEach(b=>b.onclick=e=>{e.stopPropagation();openExtract(b.dataset.id)});$$('.kv.clickable').forEach(kv=>kv.onclick=()=>toggleTrend(kv))}
function snapshotHtml(p,r){if(!r)return `<div class="card snapshot"><div class="card-head"><h2>最新记录快照</h2></div><div class="card-body"><div class="empty">暂无查房记录</div></div></div>`;const rows=snapshotRows(p,r);return `<div class="card snapshot"><div class="card-head"><h2>最新记录快照</h2><span class="quiet">${fmt(r.time)}${r.shift?' ｜ '+esc(r.shift):''}</span></div><div class="card-body"><div class="snapshot-grid">${rows.map(snapHtml).join('')||'<div class="quiet">暂无关键指标</div>'}</div></div></div>`}
function snapHtml(x){return `<div class="snap ${x.abn?'abn':''}"><span class="k">${esc(x.name)}</span><span class="v">${esc(x.val)}${x.unit?' '+esc(x.unit):''}${x.abn?' ⚠':''}</span></div>`}
function snapshotRows(p,r){const rows=[],pick=(m,ids)=>ids.forEach(id=>{const f=fields(p,m).find(x=>x.id===id),v=r.modules?.[m]?.[id];if(f&&v!==undefined&&v!=='')rows.push({name:fieldLabel(f,m),val:v,unit:fieldUnit(f,m),abn:isAbnormal(m,id,v,r)})});pick('vitals',['temp','hr','sbp','dbp','spo2']);const map=derivedMap(r);if(map!==null)rows.push({name:'MAP(估算)',val:map,unit:'mmHg',abn:map<65});pick('vent',['mode','fio2','peep','ps','vt']);const four=scoreValue(r,'fourTotal'),gcs=scoreValue(r,'gcsTotal'),s=r.scores||{};if(four!=null)rows.push({name:'FOUR',val:four,unit:'分',abn:four<8});if(gcs!=null)rows.push({name:'GCS',val:s.gcsV==='T'?gcs+'T':gcs,unit:s.gcsV==='T'?'':'分',abn:s.gcsV!=='T'&&gcs<8});pick('labs',['lac','cr','alb','ph','dd']);pick('intracranial',['icp','cpp']);const drugs=(p.customConfig.infusionDrugs||[]).map(d=>latestLog(p,d.name)).filter(Boolean).sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp)).slice(0,3);drugs.forEach(l=>rows.push({name:l.drugName,val:`${(+l.newRate).toFixed(1)} mL/h → ${(+l.doseMgPerHour).toFixed(2)} mg/h`,unit:l.doseMcgPerKgMin!=null?`｜ ${(+l.doseMcgPerKgMin).toFixed(3)} μg/kg/min`:'',abn:false}));return rows}
function timelineTitle(r){const tags=[],s=r.scores||{},four=scoreValue(r,'fourTotal'),gcs=scoreValue(r,'gcsTotal');if(four!=null)tags.push(`FOUR ${four}`);if(gcs!=null)tags.push(`GCS ${s.gcsV==='T'?gcs+'T':gcs}`);return `${fmt(r.time)}${r.shift?' ｜ '+esc(r.shift):''}${tags.length?'　'+tags.join(' '):''}`}
function summary(r,p){const out=[];for(const m of getModuleOrder(p)){if(m==='scores'){const rows=scoreRows(p,r);if(rows.length)out.push(sectionHtml('神经评分',rows));continue}const rows=fields(p,m).map(f=>rowData(p,r,m,f)).filter(Boolean);if(m==='vitals'){const map=derivedMap(r);if(map!==null)rows.push({m,f:'__map',name:'MAP(估算)',val:map,unit:'mmHg',abn:map<65})}if(rows.length)out.push(sectionHtml(ui('title-'+m,moduleTitles[m]),rows))}if(r.course)out.push(`<div class="sec-title">病程</div><div class="note-box">${esc(r.course)}</div>`);if(r.handover)out.push(`<div class="sec-title">交班备注</div><div class="note-box">${esc(r.handover)}</div>`);return out.join('')||'<div class="quiet">未填写数据</div>'}
function sectionHtml(title,rows){return `<div class="summary"><div class="sec-title">${esc(title)}</div>${rows.map(rowHtml).join('')}</div>`}
function rowHtml(row){const val=`${row.val}${row.unit?' '+row.unit:''}${row.abn?' ⚠':''}`;return `<div class="kv clickable" data-m="${esc(row.m)}" data-f="${esc(row.f)}"><span class="k">${esc(row.name)}</span><span class="v${row.abn?' abn':''}">${esc(val)}</span></div>`}
function rowData(p,r,m,f){const v=r.modules?.[m]?.[f.id];if(v===undefined||v==='')return null;return {m,f:f.id,name:fieldLabel(f,m),val:v,unit:fieldUnit(f,m),abn:isAbnormal(m,f.id,v,r)}}
function scoreRows(p,r){const s=r.scores||{},rows=[],four=scoreValue(r,'fourTotal'),gcs=scoreValue(r,'gcsTotal');if(four!=null)rows.push({m:'scores',f:'fourTotal',name:'FOUR 总分',val:`${four} 分 (E${s.fourE}M${s.fourM}B${s.fourB}R${s.fourR})`,unit:'',abn:four<8});if(gcs!=null)rows.push({m:'scores',f:'gcsTotal',name:'GCS 总分',val:s.gcsV==='T'?`${gcs}T`:`${gcs} 分`,unit:'',abn:s.gcsV!=='T'&&gcs<8});if(s.rass!=null&&s.rass!=='')rows.push({m:'scores',f:'rass',name:'RASS',val:s.rass,unit:'',abn:false});fields(p,'scores').forEach(f=>{const v=r.modules?.scores?.[f.id];if(v!==undefined&&v!=='')rows.push({m:'scores',f:f.id,name:fieldLabel(f,'scores'),val:v,unit:fieldUnit(f,'scores'),abn:false})});return rows}
function scoreValue(r,k){const s=r.scores||{};if(k==='fourTotal'){const a=['fourE','fourM','fourB','fourR'].map(x=>n(s[x]));return a.every(x=>x!==null)?a.reduce((x,y)=>x+y,0):null}if(k==='gcsTotal'){const e=n(s.gcsE),m=n(s.gcsM),v=s.gcsV==='T'?0:n(s.gcsV);return e!==null&&m!==null&&v!==null?e+m+v:null}return null}
function derivedMap(r){const sbp=n(r.modules?.vitals?.sbp),dbp=n(r.modules?.vitals?.dbp);return sbp!==null&&dbp!==null?Math.round((sbp+2*dbp)/3):null}
function isAbnormal(m,f,v,r){const x=n(v);return (m==='vitals'&&(f==='spo2'&&x!==null&&x<90||(['sbp','dbp'].includes(f)&&x!==null&&x<40)||f==='__map'&&x!==null&&x<65))||(m==='labs'&&f==='lac'&&x!==null&&x>2)||(m==='intracranial'&&f==='cpp'&&x!==null&&x<60)}
function trendValue(r,m,f){if(m==='scores'){if(f==='fourTotal'||f==='gcsTotal')return scoreValue(r,f);if(f==='rass')return r.scores?.rass;return r.modules?.scores?.[f]}if(m==='vitals'&&f==='__map')return derivedMap(r);return r.modules?.[m]?.[f]}
function trendPoints(p,m,f){const pts=[...p.records].sort((a,b)=>new Date(a.time)-new Date(b.time)).map(r=>({t:fmt(r.time).slice(5),v:trendValue(r,m,f)})).filter(x=>x.v!==undefined&&x.v!==''&&x.v!==null);return pts.length>=2?pts:null}
function trendHtml(pts){return `<div class="trend-box">趋势：${pts.map((x,i)=>`<span class="trend-point"><span class="trend-time">${esc(x.t)}</span> <span class="trend-val">${esc(x.v)}</span>${i?trendArrow(pts[i-1].v,x.v):''}</span>`).join('')}</div>`}
function trendArrow(a,b){const x=n(a),y=n(b),s=x===null||y===null?'→':y>x?'↑':y<x?'↓':'→';return ` <span class="trend-arrow">${s}</span>`}
function toggleTrend(kv){const old=kv.nextElementSibling?.classList?.contains('trend-box')?kv.nextElementSibling:null;if(old){old.remove();return}const pts=trendPoints(patient(),kv.dataset.m,kv.dataset.f);kv.insertAdjacentHTML('afterend',pts?trendHtml(pts):'<div class="trend-box">趋势：记录不足（需≥2次记录）</div>')}
function latestLogAt(p,name,time){return [...p.infusionLogs].filter(x=>x.drugName===name&&new Date(x.timestamp)<=new Date(time)).sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp))[0]||null}
function extractRecordData(p,r){const modules={};for(const m of getModuleOrder(p)){if(m==='scores')continue;const vals={};fields(p,m).forEach(f=>{const v=r.modules?.[m]?.[f.id];if(v!==undefined&&v!=='')vals[f.id]={label:fieldLabel(f,m),value:v,unit:fieldUnit(f,m)}});if(Object.keys(vals).length)modules[m]={title:ui('title-'+m,moduleTitles[m]),fields:vals}}const s=r.scores||{},four=scoreValue(r,'fourTotal'),gcs=scoreValue(r,'gcsTotal'),scoreCustom={};fields(p,'scores').forEach(f=>{const v=r.modules?.scores?.[f.id];if(v!==undefined&&v!=='')scoreCustom[f.id]={label:fieldLabel(f,'scores'),value:v,unit:fieldUnit(f,'scores')}});const infusion=(p.customConfig.infusionDrugs||[]).map(d=>latestLogAt(p,d.name,r.time)).filter(Boolean).map(l=>({drugName:l.drugName,timestamp:l.timestamp,concentration:l.concentration,previousRate:l.previousRate,newRate:l.newRate,doseMgPerHour:l.doseMgPerHour,doseMcgPerKgMin:l.doseMcgPerKgMin,patientWeight:l.patientWeight,note:l.note||''}));return {patient:{id:p.id,bed:p.bed,name:p.name,age:p.age,weight:p.weight,admno:p.admno,diagnosis:p.diag},record:{id:r.id,time:r.time,formattedTime:fmt(r.time),shift:r.shift||'',course:r.course||'',handover:r.handover||''},scores:{fourTotal:four,gcsTotal:gcs,gcsT:s.gcsV==='T',rass:s.rass||'',items:{fourE:s.fourE||'',fourM:s.fourM||'',fourB:s.fourB||'',fourR:s.fourR||'',gcsE:s.gcsE||'',gcsV:s.gcsV||'',gcsM:s.gcsM||''},custom:scoreCustom},modules,infusionLatestAtRecordTime:infusion}}
function openExtract(id){const p=patient(),r=p?.records.find(x=>x.id===id);if(!p||!r)return;const data=extractRecordData(p,r);$('#extractTitle').textContent=`提取查房数据：${fmt(r.time)}`;$('#extractOutput').value=JSON.stringify(data,null,2);$('#extractModal').dataset.filename=`icu-round-${p.bed||'patient'}-${(r.time||'').replace(/[:T]/g,'-')}.json`;$('#extractModal').classList.add('show')}

function renderFillRecordList(){const p=patient(),box=$('#fillRecordList');if(!p){box.innerHTML='<div class="empty">请先选择患者</div>';return}const records=[...p.records].sort((a,b)=>new Date(b.time)-new Date(a.time));box.className='fill-record-list';box.innerHTML=records.map(r=>{const tags=[],four=scoreValue(r,'fourTotal'),gcs=scoreValue(r,'gcsTotal'),s=r.scores||{};if(four!=null)tags.push(`FOUR ${four}`);if(gcs!=null)tags.push(`GCS ${s.gcsV==='T'?gcs+'T':gcs}`);return `<button type="button" class="fill-record-item" data-id="${esc(r.id)}"><span><b>${fmt(r.time)}${r.shift?' ｜ '+esc(r.shift):''}</b><small>${tags.join('　')||'点击后覆盖当前表单草稿'}</small></span><span class="fill-arrow">填入 ›</span></button>`}).join('')||'<div class="empty">暂无历史查房记录可提取</div>';box.onclick=e=>{const b=e.target.closest('.fill-record-item');if(b)fillDraftFromRecord(b.dataset.id)}}

function roundText(p,r){let lines=[`【${fmt(r.time)}${r.shift?'｜'+r.shift:''}】`];for(const m of getModuleOrder(p)){if(m==='scores'){const s=r.scores||{},scoreCustom=fields(p,'scores').map(f=>{const v=r.modules?.scores?.[f.id],unit=fieldUnit(f,'scores');return v!==undefined&&v!==''?`${fieldLabel(f,'scores')} ${v}${unit?' '+unit:''}`:''}).filter(Boolean);if(Object.values(s).some(Boolean)||scoreCustom.length)lines.push(`评分：FOUR ${['fourE','fourM','fourB','fourR'].map(k=>n(s[k])).every(x=>x!==null)?['fourE','fourM','fourB','fourR'].reduce((a,k)=>a+n(s[k]),0):'—'}；RASS ${s.rass||'—'}${scoreCustom.length?'；'+scoreCustom.join('；'):''}`);continue}const a=fields(p,m).map(f=>{const v=r.modules?.[m]?.[f.id],unit=fieldUnit(f,m);return v!==undefined&&v!==''?`${fieldLabel(f,m)} ${v}${unit?' '+unit:''}`:''}).filter(Boolean);if(a.length)lines.push(`${ui('title-'+m,moduleTitles[m])}：${a.join('；')}`)}if(r.course)lines.push(`病程：${r.course}`);if(r.handover)lines.push(`交班：${r.handover}`);return lines.join('\n')}

function setCloud(v){localStorage.setItem(CLOUDKEY,JSON.stringify(v));updateStorageUsage()}
function appStorageBytes(){return [DBKEY,TEXTKEY,SHIFTKEY,PROFILEKEY,CLOUDKEY,'icu_pid'].reduce((sum,k)=>sum+new Blob([localStorage.getItem(k)||'']).size,0)}
function updateStorageUsage(){const el=$('#storageUsage');if(!el)return;const mb=appStorageBytes()/1024/1024;el.textContent=`当前本机数据：${mb.toFixed(2)} MB / 建议上限 5 MB`;el.classList.toggle('warn',mb>=4)}
function avatarMarkup(p,cls=''){return p.avatar?`<img src="${esc(p.avatar)}" alt="头像">`:esc((p.name||'我').slice(0,1))}
function renderMeHeader(){const p=getProfile();$('#meAvatar').innerHTML=avatarMarkup(p);$('#meName').textContent=p.name||'我的'}
function openMe(){renderMe();$('#meModal').classList.add('show')}
function renderMe(){const p=getProfile(),c=getCloud(),native=isNativeApp();$('#avatarPick').innerHTML=avatarMarkup(p);$('#profileName').value=p.name||'';$('#profileNote').value=p.note||'';$('#davUrl').value=c.url||'https://dav.jianguoyun.com/dav/';$('#davUser').value=c.user||'';$('#davPass').value=c.pass||'';$('#davPath').value=c.path||'icu-rounds-backup.json';$('#davAuto').checked=!!c.auto;$('#cloudPanel').hidden=!native;$('#webBackupNote').hidden=native;updateStorageUsage()}
function saveMe(silent=false){const p={name:$('#profileName').value.trim()||'我的',note:$('#profileNote').value.trim(),avatar:getProfile().avatar||''};const c={url:$('#davUrl').value.trim()||'https://dav.jianguoyun.com/dav/',user:$('#davUser').value.trim(),pass:$('#davPass').value,path:$('#davPath').value.trim()||'icu-rounds-backup.json',auto:$('#davAuto').checked};setProfile(p);setCloud(c);renderMeHeader();if(!silent)toast('设置已保存')}
function resizeAvatar(file){return new Promise((resolve,reject)=>{const img=new Image(),url=URL.createObjectURL(file);img.onload=()=>{const max=256,scale=Math.min(1,max/img.width,max/img.height),w=Math.max(1,Math.round(img.width*scale)),h=Math.max(1,Math.round(img.height*scale)),canvas=document.createElement('canvas');canvas.width=w;canvas.height=h;canvas.getContext('2d').drawImage(img,0,0,w,h);URL.revokeObjectURL(url);resolve(canvas.toDataURL('image/jpeg',.85))};img.onerror=()=>{URL.revokeObjectURL(url);reject()};img.src=url})}
async function changeAvatar(e){const f=e.target.files[0];if(!f)return;try{const p=getProfile();p.avatar=await resizeAvatar(f);setProfile(p);renderMe();toast('头像已更新')}catch(err){toast('头像读取失败')}}
function davAuth(c){return 'Basic '+btoa(unescape(encodeURIComponent(`${c.user}:${c.pass}`)))}
function davTarget(c){const base=(c.url||'https://dav.jianguoyun.com/dav/').replace(/\/+$/,'/'),path=(c.path||'icu-rounds-backup.json').replace(/^\/+/,'');return base+path.split('/').map(encodeURIComponent).join('/')}
function cloudReady(c){if(!isNativeApp())return toast('网页版不启用云端上传，请使用 JSON 导出备份'),false;if(!c.user||!c.pass)return toast('请填写坚果云账号和应用密码'),false;if(!/^https?:\/\//.test(c.url||''))return toast('WebDAV 地址需以 http/https 开头'),false;return true}
async function testDav(){saveMe(true);const c=getCloud();if(!cloudReady(c))return;try{const r=await fetch((c.url||'').replace(/\/+$/,'/') ,{method:'PROPFIND',headers:{Authorization:davAuth(c),Depth:'0'}});toast(r.ok||r.status===207?'坚果云连接成功':`连接失败：HTTP ${r.status}`)}catch(e){toast('连接失败：可能被浏览器跨域/CORS 拦截')}}
async function uploadDav(silent=false){if(!silent)saveMe(true);const c=getCloud();if(!cloudReady(c))return;try{const body=JSON.stringify(db,null,2),r=await fetch(davTarget(c),{method:'PUT',headers:{Authorization:davAuth(c),'Content-Type':'application/json;charset=utf-8'},body});if(r.ok||[200,201,204].includes(r.status)){if(!silent)toast('已上传到坚果云')}else toast(`上传失败：HTTP ${r.status}`)}catch(e){if(!silent)toast('上传失败：可能被浏览器跨域/CORS 拦截')}}
async function restoreDav(){saveMe(true);const c=getCloud();if(!cloudReady(c))return;if(!confirm('从云端恢复会覆盖当前本机数据，建议先导出 JSON 备份。确定继续？'))return;try{const r=await fetch(davTarget(c),{headers:{Authorization:davAuth(c)}});if(!r.ok)throw new Error('HTTP '+r.status);const x=JSON.parse(await r.text());if(!Array.isArray(x.patients))throw new Error('bad json');db=x;save();renderAll();toast('已从云端恢复')}catch(e){toast('恢复失败：文件不存在、格式错误或被 CORS 拦截')}}
let cloudTimer=null;
function scheduleCloudBackup(){const c=getCloud();if(!isNativeApp()||!c.auto||!c.user||!c.pass)return;clearTimeout(cloudTimer);cloudTimer=setTimeout(()=>uploadDav(true),1500)}
function applyUi(){const texts=JSON.parse(localStorage.getItem(TEXTKEY)||'{}');$$('[data-ui]').forEach(e=>{const k=e.dataset.ui;if(!e.dataset.base)e.dataset.base=e.textContent;e.textContent=texts[k]||e.dataset.base;e.contentEditable=textEdit?'true':'false'});$$('[data-ui-placeholder]').forEach(e=>{const k=e.dataset.uiPlaceholder;e.placeholder=texts[k]||e.dataset.basePlaceholder||e.placeholder;e.dataset.basePlaceholder=e.placeholder});$('#textEdit').textContent=textEdit?'锁定文字':'编辑文字'}
function toggleText(){if(textEdit){const t=JSON.parse(localStorage.getItem(TEXTKEY)||'{}');$$('[data-ui]').forEach(e=>t[e.dataset.ui]=e.textContent.trim());localStorage.setItem(TEXTKEY,JSON.stringify(t));textEdit=false;renderAll();toast('文字已保存')}else{textEdit=true;applyUi();toast('现在可直接修改文字，完成后点“锁定文字”')}}
function openPatient(p){$('#patientModal').classList.add('show');$('#patientModal').dataset.id=p?.id||'';$('#patientModalTitle').textContent=p?'编辑患者':'新增患者';for(const [id,k] of [['pBed','bed'],['pName','name'],['pAge','age'],['pWeight','weight'],['pAdm','admno'],['pDiag','diag']])$('#'+id).value=p?.[k]||'';renderPatientManage()}
function renderPatientManage(){const box=$('#patientManageList');box.innerHTML=db.patients.map(p=>`<div class="inf-row"><span><b>${esc(p.bed)} 床 ${esc(p.name)}</b><br><small>${esc(p.diag||'')}</small></span><span class="inf-actions"><button class="small edit-p" data-id="${p.id}">编辑</button><button class="small danger del-p" data-id="${p.id}">删除</button></span></div>`).join('');$$('.edit-p').forEach(b=>b.onclick=()=>openPatient(db.patients.find(x=>x.id===b.dataset.id)));$$('.del-p').forEach(b=>b.onclick=()=>{if(confirm('删除患者及其全部数据？')){db.patients=db.patients.filter(x=>x.id!==b.dataset.id);if(pid===b.dataset.id)pid=null;save();renderPatientManage();renderAll()}})}
function savePatient(){const data={bed:$('#pBed').value.trim(),name:$('#pName').value.trim(),age:$('#pAge').value.trim(),weight:$('#pWeight').value.trim(),admno:$('#pAdm').value.trim(),diag:$('#pDiag').value.trim()};if(!data.bed||!data.name)return toast('请填写床号和姓名');const id=$('#patientModal').dataset.id,p=id?db.patients.find(x=>x.id===id):null;if(p)Object.assign(p,data);else{const x=newPatientData(data);db.patients.push(x);pid=x.id}localStorage.setItem('icu_pid',pid);save();$('#patientModal').classList.remove('show');startDraft(latestRound(patient()));renderAll()}
function renderAll(){renderPatients();renderEntry();renderTimeline();renderMeHeader();updateStorageUsage();applyUi();updateFab()}
async function checkAppUpdate(){try{if(location.protocol==='file:')return;const oldVersion=document.querySelector('meta[name="app-version"]')?.content||'';const resp=await fetch(location.pathname+'?t='+Date.now(),{cache:'no-store'});const html=await resp.text();const m=html.match(/<meta name="app-version" content="([^"]+)"/);const newVersion=m?.[1]||'';if(oldVersion&&newVersion&&oldVersion!==newVersion&&confirm('发现新版本，是否立即更新？本机已保存数据不会被清空。'))location.reload()}catch(e){}}
$('#search').oninput=renderPatients;$('#newPatient').onclick=()=>openPatient();$('#savePatient').onclick=savePatient;$('#manageBtn').onclick=()=>openPatient(patient());$('#textEdit').onclick=toggleText;$('#backupBtn').onclick=()=>$('.tab[data-page="export"]').click();$('#meBtn').onclick=openMe;$('#avatarPick').onclick=()=>$('#avatarFile').click();$('#avatarFile').onchange=changeAvatar;$('#saveMe').onclick=()=>saveMe();$('#testDav').onclick=testDav;$('#uploadDav').onclick=()=>uploadDav(false);$('#restoreDav').onclick=restoreDav;$$('[data-close]').forEach(b=>b.onclick=()=>$('#'+b.dataset.close).classList.remove('show'));$('#roundTime').onchange=e=>draft&&(draft.time=e.target.value);$('#nowTime').onclick=()=>{const t=localTime();$('#roundTime').value=t;if(draft)draft.time=t;toast('已设为此刻')};$('#fillFromRecord').onclick=openFillFromRecord;$('#course').oninput=e=>draft&&(draft.course=e.target.value);$('#handover').oninput=e=>draft&&(draft.handover=e.target.value);$('#clearDraft').onclick=()=>{if(confirm('清空当前表单？')){editingId=null;startDraft();renderEntry()}};$('#saveRound').onclick=saveRound;$('#fabSave').onclick=saveRound;$('#copyExtract').onclick=()=>copy($('#extractOutput').value);$('#downloadExtract').onclick=downloadExtract;$('#infRate').oninput=renderInfCalc;$('#infConfig').onclick=()=>openConc(infCtx.id);$('#saveInf').onclick=saveInf;$('#addShift').onclick=addShiftOption;$('#saveConc').onclick=()=>{const d=patient().customConfig.infusionDrugs.find(x=>x.id===infCtx.id),v=n($('#concInput').value);if(!v||v<=0)return toast('请输入有效浓度');d.conc=v;save();$('#concModal').classList.remove('show');if($('#infModal').classList.contains('show'))renderInfCalc();renderInfusion()};$$('.tab').forEach(b=>b.onclick=()=>{$$('.tab').forEach(x=>x.classList.toggle('active',x===b));['entry','timeline','export'].forEach(x=>$('#'+x+'Page').hidden=x!==b.dataset.page);if(b.dataset.page==='timeline')renderTimeline();updateFab()});$('#generateExport').onclick=()=>$('#exportText').value=allText();$('#copyExport').onclick=()=>copy($('#exportText').value);$('#downloadJson').onclick=()=>{const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(db,null,2)],{type:'application/json'}));a.download='icu-rounds-backup.json';a.click();URL.revokeObjectURL(a.href)};$('#importJson').onclick=()=>$('#jsonFile').click();$('#jsonFile').onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader;r.onload=()=>{try{const x=JSON.parse(r.result);if(!Array.isArray(x.patients))throw 0;if(!confirm(`导入 ${x.patients.length} 名患者？同床号与住院号的数据将覆盖。`))return;x.patients.forEach(q=>{ensure(q);const old=db.patients.find(p=>String(p.bed)===String(q.bed)&&String(p.admno||'')===String(q.admno||''));if(old)Object.assign(old,q,{id:old.id});else db.patients.push(newPatientData(q))});save();renderAll();toast('导入完成')}catch(err){toast('JSON 文件格式不正确')}};r.readAsText(f)};
if(pid&&!patient())pid=null;if(patient())startDraft(latestRound(patient()));renderAll();setTimeout(checkAppUpdate,2000);
</script></body></html>
